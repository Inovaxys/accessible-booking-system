<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Accessible Booking System</title>

  <style>
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #28a745;
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s ease;
      font-size: 14px;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .loader::after {
      content: "";
      border: 5px solid #eee;
      border-top: 5px solid #007bff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    .hidden {
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .search-box {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 25px;
      font-size: 14px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: white;
      margin-bottom: 15px;
      padding: 15px 20px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s;
    }

    li:hover {
      transform: translateY(-2px);
    }

    .time {
      font-size: 14px;
      color: #555;
    }

    button {
      padding: 8px 14px;
      border: none;
      background: #28a745;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #218838;
      transform: scale(1.05);
    }

    .empty {
      text-align: center;
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<!-- Toast -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- Loader -->
<div id="loader" class="loader hidden" aria-hidden="true"></div>

<div class="container">

  <h1>📅 Accessible Booking System</h1>
<p class="subtitle">Book your preferred time slots easily</p>

  <label for="booking-date">Select Booking Date:</label>
  <input 
    id="booking-date"
    class="booking-date search-box"
    type="date"
    aria-required="true"
  />

  <input 
    class="search-box"
    type="text" 
    placeholder="🔍 Search slots..." 
    oninput="handleSearch(this.value)" 
    aria-label="Search available booking slots"
  />

  <ul id="slots" role="list" aria-live="polite"></ul>

</div>

<script src="app.js"></script>
<script src="frontend/ia-custom-control.js"></script>

</body>
</html>
